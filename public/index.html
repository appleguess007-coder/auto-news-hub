<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoPulse 汽车脉搏</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* === RESET & ROOT === */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-void:#06060b;
  --bg-base:#0c0c14;
  --bg-raised:#12121e;
  --bg-card:#16162a;
  --bg-hover:#1c1c36;
  --border:#1e1e3a;
  --border-bright:#2a2a50;
  --text-primary:#e8e8f0;
  --text-secondary:#8888a8;
  --text-muted:#55556a;
  --accent-pulse:#ff3c3c;
  --accent-blue:#3b82f6;
  /* Source colors */
  --src-sina:#ff6b00;
  --src-cailian:#e23c39;
  --src-reuters:#ff8800;
  --src-autohome:#2f7bed;
  --src-yiche:#1db954;
  --src-kr36:#1a6cff;
  --src-tencent:#07c160;
  --src-gasgoo:#c77dff;
  --src-dongchedi:#ff4757;
  --src-thepaper:#2ed573;
  --src-sohu:#ff6348;
  --font-display:'Instrument Sans','Noto Sans SC',sans-serif;
  --font-body:'Noto Sans SC','Instrument Sans',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
html{font-size:14px;-webkit-font-smoothing:antialiased}
body{
  font-family:var(--font-body);
  background:var(--bg-void);
  color:var(--text-primary);
  min-height:100vh;
  overflow-x:hidden;
}
/* === BACKGROUND GRID TEXTURE === */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(255,255,255,.012) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.012) 1px,transparent 1px);
  background-size:60px 60px;
}
body::after{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(255,60,60,.04),transparent),
             radial-gradient(ellipse 60% 40% at 80% 100%,rgba(59,130,246,.03),transparent);
}

/* === LAYOUT SHELL === */
.shell{position:relative;z-index:1;display:flex;flex-direction:column;min-height:100vh}

/* === HEADER === */
.header{
  position:sticky;top:0;z-index:100;
  background:rgba(6,6,11,.88);
  backdrop-filter:blur(20px) saturate(1.4);
  border-bottom:1px solid var(--border);
  padding:0 1.5rem;
}
.header-top{
  display:flex;align-items:center;justify-content:space-between;
  height:56px;gap:1rem;
}
.brand{display:flex;align-items:center;gap:.75rem}
.brand-mark{
  width:8px;height:32px;border-radius:2px;
  background:var(--accent-pulse);
  box-shadow:0 0 20px rgba(255,60,60,.4);
  animation:pulse-glow 2s ease-in-out infinite;
}
@keyframes pulse-glow{
  0%,100%{box-shadow:0 0 12px rgba(255,60,60,.3)}
  50%{box-shadow:0 0 24px rgba(255,60,60,.6)}
}
.brand h1{
  font-family:var(--font-display);
  font-size:1.35rem;font-weight:700;letter-spacing:-.02em;
  background:linear-gradient(135deg,#fff 60%,var(--accent-pulse));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.brand-sub{
  font-family:var(--font-mono);font-size:.7rem;
  color:var(--text-muted);letter-spacing:.08em;text-transform:uppercase;
  margin-left:.25rem;
}
.header-meta{display:flex;align-items:center;gap:1.25rem}
.clock{font-family:var(--font-mono);font-size:.85rem;color:var(--text-secondary);letter-spacing:.05em}
.refresh-badge{
  display:flex;align-items:center;gap:.5rem;
  padding:.3rem .7rem;border-radius:6px;
  background:rgba(255,60,60,.08);border:1px solid rgba(255,60,60,.15);
  font-family:var(--font-mono);font-size:.75rem;color:var(--accent-pulse);
  cursor:pointer;transition:all .2s;
}
.refresh-badge:hover{background:rgba(255,60,60,.15);border-color:rgba(255,60,60,.3)}
.refresh-badge .dot{
  width:6px;height:6px;border-radius:50%;background:var(--accent-pulse);
  animation:blink 1.5s step-end infinite;
}
@keyframes blink{50%{opacity:.3}}
.total-count{
  font-family:var(--font-mono);font-size:.75rem;color:var(--text-muted);
  padding:.25rem .6rem;border-radius:4px;background:var(--bg-raised);
}

/* === FILTER BAR === */
.filter-bar{
  display:flex;align-items:center;gap:.5rem;
  padding:.65rem 0;overflow-x:auto;
  scrollbar-width:none;
}
.filter-bar::-webkit-scrollbar{display:none}
.source-pill{
  flex-shrink:0;display:flex;align-items:center;gap:.4rem;
  padding:.35rem .75rem;border-radius:6px;
  background:var(--bg-raised);border:1px solid var(--border);
  font-size:.8rem;color:var(--text-secondary);
  cursor:pointer;transition:all .2s;white-space:nowrap;
  font-family:var(--font-body);font-weight:500;
}
.source-pill:hover{background:var(--bg-hover);color:var(--text-primary);border-color:var(--border-bright)}
.source-pill.active{color:#fff;border-color:transparent}
.source-pill .pill-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.source-pill[data-source="all"].active{background:rgba(255,255,255,.12)}
.source-pill[data-source="sina-auto"].active{background:rgba(255,107,0,.2);border-color:var(--src-sina)}
.source-pill[data-source="cailian"].active{background:rgba(226,60,57,.2);border-color:var(--src-cailian)}
.source-pill[data-source="reuters"].active{background:rgba(255,136,0,.2);border-color:var(--src-reuters)}
.source-pill[data-source="autohome"].active{background:rgba(47,123,237,.2);border-color:var(--src-autohome)}
.source-pill[data-source="yiche"].active{background:rgba(29,185,84,.2);border-color:var(--src-yiche)}
.source-pill[data-source="kr36"].active{background:rgba(26,108,255,.2);border-color:var(--src-kr36)}
.source-pill[data-source="tencent"].active{background:rgba(7,193,96,.2);border-color:var(--src-tencent)}
.source-pill[data-source="gasgoo"].active{background:rgba(199,125,255,.2);border-color:var(--src-gasgoo)}
.source-pill[data-source="dongchedi"].active{background:rgba(255,71,87,.2);border-color:var(--src-dongchedi)}
.source-pill[data-source="thepaper"].active{background:rgba(46,213,115,.2);border-color:var(--src-thepaper)}
.source-pill[data-source="sohu"].active{background:rgba(255,99,72,.2);border-color:var(--src-sohu)}

/* === SEARCH BAR === */
.search-row{
  display:flex;align-items:center;gap:.6rem;
  padding:0 1.5rem .75rem;
  background:rgba(6,6,11,.5);
}
.search-box{
  flex:1;position:relative;max-width:480px;
}
.search-box input{
  width:100%;padding:.55rem 1rem .55rem 2.4rem;
  background:var(--bg-raised);border:1px solid var(--border);border-radius:8px;
  color:var(--text-primary);font-size:.85rem;font-family:var(--font-body);
  outline:none;transition:all .2s;
}
.search-box input::placeholder{color:var(--text-muted)}
.search-box input:focus{border-color:var(--accent-blue);box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.search-box .search-icon{
  position:absolute;left:.8rem;top:50%;transform:translateY(-50%);
  color:var(--text-muted);font-size:.9rem;pointer-events:none;
}
.quick-chips{display:flex;gap:.35rem;flex-wrap:wrap}
.chip{
  padding:.3rem .6rem;border-radius:5px;
  background:var(--bg-card);border:1px solid var(--border);
  font-size:.72rem;color:var(--text-secondary);
  cursor:pointer;transition:all .15s;white-space:nowrap;
}
.chip:hover{background:var(--bg-hover);color:var(--text-primary)}
.chip.active{background:rgba(59,130,246,.15);border-color:var(--accent-blue);color:var(--accent-blue)}

/* === MAIN CONTENT === */
.main{flex:1;padding:1rem 1.5rem 5rem;position:relative}
.feed{display:flex;flex-direction:column;gap:2px;max-width:960px}

/* === NEWS CARD === */
.news-card{
  display:grid;grid-template-columns:auto 1fr auto;gap:.75rem;
  padding:.85rem 1rem;border-radius:8px;
  background:var(--bg-base);border:1px solid transparent;
  cursor:pointer;transition:all .18s;
  animation:card-in .4s ease both;
}
.news-card:hover{background:var(--bg-raised);border-color:var(--border)}
@keyframes card-in{
  from{opacity:0;transform:translateY(8px)}
  to{opacity:1;transform:translateY(0)}
}
.card-source{
  display:flex;flex-direction:column;align-items:center;gap:.25rem;
  padding-top:.15rem;min-width:56px;
}
.source-tag{
  font-size:.6rem;font-weight:600;letter-spacing:.04em;
  padding:.2rem .45rem;border-radius:3px;
  text-transform:uppercase;white-space:nowrap;
}
.source-tag[data-s="sina-auto"]{background:rgba(255,107,0,.15);color:var(--src-sina)}
.source-tag[data-s="cailian"]{background:rgba(226,60,57,.15);color:var(--src-cailian)}
.source-tag[data-s="reuters"]{background:rgba(255,136,0,.15);color:var(--src-reuters)}
.source-tag[data-s="autohome"]{background:rgba(47,123,237,.15);color:var(--src-autohome)}
.source-tag[data-s="yiche"]{background:rgba(29,185,84,.15);color:var(--src-yiche)}
.source-tag[data-s="kr36"]{background:rgba(26,108,255,.15);color:var(--src-kr36)}
.source-tag[data-s="tencent"]{background:rgba(7,193,96,.15);color:var(--src-tencent)}
.source-tag[data-s="gasgoo"]{background:rgba(199,125,255,.15);color:var(--src-gasgoo)}
.source-tag[data-s="dongchedi"]{background:rgba(255,71,87,.15);color:var(--src-dongchedi)}
.source-tag[data-s="thepaper"]{background:rgba(46,213,115,.15);color:var(--src-thepaper)}
.source-tag[data-s="sohu"]{background:rgba(255,99,72,.15);color:var(--src-sohu)}
.card-time{
  font-family:var(--font-mono);font-size:.65rem;color:var(--text-muted);
  white-space:nowrap;
}
.card-body h3{
  font-family:var(--font-display);font-size:.95rem;font-weight:600;
  line-height:1.45;color:var(--text-primary);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  transition:color .15s;
}
.news-card:hover .card-body h3{color:#fff}
.card-body .snippet{
  margin-top:.3rem;font-size:.78rem;line-height:1.55;
  color:var(--text-muted);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.card-body .card-tags{
  display:flex;gap:.3rem;margin-top:.35rem;flex-wrap:wrap;
}
.card-body .card-tags span{
  font-size:.62rem;padding:.1rem .35rem;border-radius:3px;
  background:var(--bg-hover);color:var(--text-muted);
}
.card-actions{
  display:flex;flex-direction:column;align-items:flex-end;justify-content:center;
  gap:.3rem;min-width:40px;
}
.card-link{
  font-size:.7rem;color:var(--text-muted);text-decoration:none;
  padding:.2rem .4rem;border-radius:4px;transition:all .15s;
}
.card-link:hover{background:var(--bg-hover);color:var(--accent-blue)}

/* === EMPTY / LOADING === */
.feed-empty{
  text-align:center;padding:4rem 1rem;color:var(--text-muted);
}
.feed-empty .empty-icon{font-size:2.5rem;margin-bottom:1rem;opacity:.4}
.feed-loading{display:flex;flex-direction:column;gap:2px}
.skel{
  height:72px;border-radius:8px;background:var(--bg-raised);
  animation:skel-pulse 1.5s ease-in-out infinite;
}
@keyframes skel-pulse{0%,100%{opacity:.5}50%{opacity:.8}}

/* === LOAD MORE === */
.load-more{
  display:block;margin:1.5rem auto 0;
  padding:.5rem 2rem;border-radius:6px;
  background:var(--bg-raised);border:1px solid var(--border);
  color:var(--text-secondary);font-size:.8rem;cursor:pointer;
  font-family:var(--font-body);transition:all .2s;
}
.load-more:hover{background:var(--bg-hover);color:var(--text-primary);border-color:var(--border-bright)}

/* === TOAST NOTIFICATION === */
.toast-container{
  position:fixed;top:68px;right:1.5rem;z-index:200;
  display:flex;flex-direction:column;gap:.5rem;pointer-events:none;
}
.toast{
  padding:.6rem 1rem;border-radius:8px;
  background:rgba(255,60,60,.12);border:1px solid rgba(255,60,60,.25);
  backdrop-filter:blur(12px);
  color:var(--accent-pulse);font-size:.8rem;font-weight:500;
  animation:toast-in .3s ease,toast-out .3s ease 3.5s forwards;
  pointer-events:auto;
}
@keyframes toast-in{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes toast-out{to{opacity:0;transform:translateX(40px)}}

/* === STATUS BAR === */
.status-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;gap:1rem;
  padding:.4rem 1.5rem;
  background:rgba(6,6,11,.92);backdrop-filter:blur(16px);
  border-top:1px solid var(--border);
  font-family:var(--font-mono);font-size:.68rem;color:var(--text-muted);
  overflow-x:auto;scrollbar-width:none;
}
.status-bar::-webkit-scrollbar{display:none}
.status-item{display:flex;align-items:center;gap:.35rem;white-space:nowrap}
.status-dot{width:5px;height:5px;border-radius:50%}
.status-dot.ok{background:#1db954}
.status-dot.err{background:#e23c39}
.status-dot.run{background:#ffaa00;animation:blink 1s step-end infinite}

/* === SCROLL TOP === */
.scroll-top{
  position:fixed;bottom:3rem;right:1.5rem;z-index:150;
  width:36px;height:36px;border-radius:50%;
  background:var(--bg-card);border:1px solid var(--border);
  color:var(--text-secondary);font-size:1rem;
  cursor:pointer;transition:all .2s;
  display:none;align-items:center;justify-content:center;
}
.scroll-top.visible{display:flex}
.scroll-top:hover{background:var(--bg-hover);color:var(--text-primary);border-color:var(--border-bright)}

/* === RESPONSIVE === */
@media(max-width:768px){
  .header{padding:0 1rem}
  .search-row{padding:0 1rem .6rem;flex-wrap:wrap}
  .main{padding:.75rem 1rem 5rem}
  .news-card{grid-template-columns:auto 1fr;gap:.5rem;padding:.7rem .75rem}
  .card-actions{display:none}
  .brand-sub{display:none}
  .header-meta .total-count{display:none}
  .quick-chips{display:none}
}
@media(max-width:480px){
  .source-pill{padding:.3rem .55rem;font-size:.72rem}
  .card-source{min-width:44px}
  .card-body h3{font-size:.88rem}
}
</style>
</head>
<body>
<div class="shell">
  <!-- HEADER -->
  <header class="header">
    <div class="header-top">
      <div class="brand">
        <div class="brand-mark"></div>
        <h1>AutoPulse</h1>
        <span class="brand-sub">汽车脉搏</span>
      </div>
      <div class="header-meta">
        <span class="total-count" id="totalCount">0 条</span>
        <span class="clock" id="clock">--:--:--</span>
        <div class="refresh-badge" id="refreshBadge" title="点击立即刷新">
          <span class="dot"></span>
          <span id="countdown">05:00</span>
        </div>
      </div>
    </div>
    <div class="filter-bar" id="filterBar">
      <button class="source-pill active" data-source="all">
        <span class="pill-dot" style="background:#888"></span>全部
      </button>
      <button class="source-pill" data-source="sina-auto">
        <span class="pill-dot" style="background:var(--src-sina)"></span>新浪汽车
      </button>
      <button class="source-pill" data-source="cailian">
        <span class="pill-dot" style="background:var(--src-cailian)"></span>财联社
      </button>
      <button class="source-pill" data-source="reuters">
        <span class="pill-dot" style="background:var(--src-reuters)"></span>路透社
      </button>
      <button class="source-pill" data-source="autohome">
        <span class="pill-dot" style="background:var(--src-autohome)"></span>汽车之家
      </button>
      <button class="source-pill" data-source="yiche">
        <span class="pill-dot" style="background:var(--src-yiche)"></span>易车网
      </button>
      <button class="source-pill" data-source="kr36">
        <span class="pill-dot" style="background:var(--src-kr36)"></span>36氪汽车
      </button>
      <button class="source-pill" data-source="tencent">
        <span class="pill-dot" style="background:var(--src-tencent)"></span>腾讯汽车
      </button>
      <button class="source-pill" data-source="gasgoo">
        <span class="pill-dot" style="background:var(--src-gasgoo)"></span>盖世汽车
      </button>
      <button class="source-pill" data-source="dongchedi">
        <span class="pill-dot" style="background:var(--src-dongchedi)"></span>懂车帝
      </button>
      <button class="source-pill" data-source="thepaper">
        <span class="pill-dot" style="background:var(--src-thepaper)"></span>澎湃新闻
      </button>
      <button class="source-pill" data-source="sohu">
        <span class="pill-dot" style="background:var(--src-sohu)"></span>搜狐汽车
      </button>
    </div>
  </header>

  <!-- SEARCH -->
  <div class="search-row">
    <div class="search-box">
      <span class="search-icon">⌕</span>
      <input type="text" id="searchInput" placeholder="搜索关键词，如 比亚迪、固态电池、降价..." />
    </div>
    <div class="quick-chips" id="quickChips">
      <span class="chip" data-kw="新能源">新能源</span>
      <span class="chip" data-kw="比亚迪">比亚迪</span>
      <span class="chip" data-kw="特斯拉">特斯拉</span>
      <span class="chip" data-kw="智能驾驶">智能驾驶</span>
      <span class="chip" data-kw="销量">销量</span>
      <span class="chip" data-kw="降价">降价</span>
    </div>
  </div>

  <!-- MAIN FEED -->
  <main class="main">
    <div class="feed" id="feed">
      <div class="feed-loading" id="feedLoading">
        <div class="skel"></div><div class="skel"></div><div class="skel"></div>
        <div class="skel"></div><div class="skel"></div><div class="skel"></div>
      </div>
    </div>
    <button class="load-more" id="loadMore" style="display:none">加载更多</button>
  </main>

  <!-- TOAST -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- SCROLL TOP -->
  <button class="scroll-top" id="scrollTop">↑</button>

  <!-- STATUS BAR -->
  <div class="status-bar" id="statusBar">
    <span style="color:var(--text-muted)">SCRAPERS</span>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
